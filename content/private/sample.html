<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Private Page</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f9fafb; padding: 2rem; }
    .card { max-width: 720px; margin: 2rem auto; background: white; border: 1px solid #e5e7eb; border-radius: 0.75rem; padding: 2rem; }
    h1 { color: #1f2937; margin-bottom: 1rem; }
    p { color: #4b5563; line-height: 1.6; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Private Page</h1>
    <p>This page is only visible to users explicitly granted access in Firestore.</p>
  </div>
</body>
</html>

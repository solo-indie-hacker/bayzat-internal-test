<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard - Bayzat</title>
  </head>
  <body>
    <div id="dashboard-page" class="page">
      <div class="dashboard-container">
        <header class="dashboard-header">
          <div class="brand">BAYZAT</div>
          <div class="header-right">
            <div class="user-avatar" id="user-avatar"></div>
            <span id="user-name"></span>
            <button id="logout-button" class="logout-btn">Log out</button>
          </div>
        </header>
        <main class="dashboard-main">
          <h1>Dashboard</h1>
          <p class="subtitle">Welcome back, <span id="user-display-name"></span></p>
          <div class="dashboard-card">
            <h2>Your Profile</h2>
            <div class="profile-info">
              <div class="profile-row">
                <span class="label">Name</span>
                <span id="profile-name"></span>
              </div>
              <div class="profile-row">
                <span class="label">Email</span>
                <span id="profile-email"></span>
              </div>
            </div>
          </div>
        </main>
      </div>
    </div>

    <script type="module" src="/src/dashboard.js"></script>
  </body>
</html>

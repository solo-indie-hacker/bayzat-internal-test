<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bayzat - Login</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; min-height: 100vh; display: flex; align-items: center; justify-content: center; background: #fafafa; }
    .container { width: 100%; max-width: 460px; padding: 2rem; }
    .logo { font-size: 1.5rem; font-weight: 900; letter-spacing: 0.2em; color: #7c3aed; }
    h1 { margin-top: 2rem; font-size: 2.25rem; font-weight: 600; color: #1f2937; }
    .subtitle { margin-top: 0.5rem; color: #6b7280; }
    .divider { display: flex; align-items: center; margin: 2rem 0; gap: 1rem; }
    .divider span { font-size: 0.875rem; color: #6b7280; white-space: nowrap; }
    .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: #e5e7eb; }
    .btn { display: flex; align-items: center; justify-content: center; gap: 0.75rem; width: 100%; padding: 0.875rem 1.5rem; border: 1px solid #e5e7eb; border-radius: 0.5rem; background: white; font-size: 1rem; color: #1f2937; cursor: pointer; transition: all 0.15s; }
    .btn:hover { background: #f9fafb; box-shadow: 0 1px 2px rgba(0,0,0,0.05); }
    .btn:disabled { opacity: 0.6; cursor: not-allowed; }
    .error { margin-top: 1rem; padding: 0.625rem 0.875rem; border: 1px solid #fecaca; background: #fef2f2; border-radius: 0.375rem; font-size: 0.875rem; color: #dc2626; display: none; }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">BAYZAT</div>
    <h1>Welcome back</h1>
    <p class="subtitle">Log in to Bayzat</p>

    <div id="error" class="error"></div>

    <div class="divider"><span>Sign in with</span></div>

    <button class="btn" id="loginBtn" onclick="handleLogin()">
      <svg width="20" height="20" viewBox="0 0 48 48">
        <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
        <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
        <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
        <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
      </svg>
      Log in with Google
    </button>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.8.1/firebase-app.js";
    import { getAuth, signInWithPopup, GoogleAuthProvider } from "https://www.gstatic.com/firebasejs/11.8.1/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDsh4rmntWI0ljroIeFehZWTequSPUxfLM",
      authDomain: "cs-material-test.firebaseapp.com",
      projectId: "cs-material-test",
      storageBucket: "cs-material-test.firebasestorage.app",
      messagingSenderId: "398771475878",
      appId: "1:398771475878:web:1044e9065ed169ef3c2b67",
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const provider = new GoogleAuthProvider();

    window.handleLogin = async function () {
      const btn = document.getElementById("loginBtn");
      const errorEl = document.getElementById("error");
      btn.disabled = true;
      btn.textContent = "Signing in...";
      errorEl.style.display = "none";

      try {
        const result = await signInWithPopup(auth, provider);
        const idToken = await result.user.getIdToken();

        const res = await fetch("/api/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ idToken }),
        });

        if (res.ok) {
          window.location.href = "/dashboard";
        } else {
          const data = await res.json();
          errorEl.textContent = data.error || "Login failed";
          errorEl.style.display = "block";
          await auth.signOut();
        }
      } catch (err) {
        errorEl.textContent = err.message || "An error occurred";
        errorEl.style.display = "block";
      } finally {
        btn.disabled = false;
        btn.innerHTML = '<svg width="20" height="20" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg> Log in with Google';
      }
    };
  </script>
</body>
</html>
